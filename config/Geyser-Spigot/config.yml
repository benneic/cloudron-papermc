# --------------------------------
# Geyser Configuration File
# Cloudron PaperMC default — edit via File Manager at
# /app/data/server/plugins/Geyser-Spigot/config.yml
# --------------------------------

bedrock:
  # Listen on all interfaces inside the container.
  # Cloudron maps the external UDP port (default 19132) to this.
  address: 0.0.0.0
  port: 19132
  clone-remote-port: false
  motd1: "GeyserMC"
  motd2: "Another GeyserMC server."
  server-name: "Geyser"

remote:
  # "auto" connects to the local Java server automatically.
  address: auto
  port: 25565
  # "floodgate" allows Bedrock players to join without a Java account
  # (requires the Floodgate plugin, which is installed alongside Geyser).
  auth-type: floodgate

# Path to the Floodgate public key (generated by Floodgate on first run).
floodgate-key-file: public-key.pem

command-suggestions: true
passthrough-motd: true
passthrough-protocol-name: false
passthrough-player-counts: true
legacy-ping-passthrough: false
ping-passthrough-interval: 3

max-players: 100
debug-mode: false
general-thread-pool: 32

allow-third-party-capes: true
allow-third-party-ears: false
show-cooldown: true
show-coordinates: true

cache-chunks: true
cache-images: 0
allow-custom-skulls: true
above-bedrock-nether-building: false
force-resource-packs: true
xbox-achievements-enabled: false

metrics:
  enabled: true
  uuid: generateduuid

scoreboard-packet-threshold: 20
enable-proxy-connections: false
use-adapters: true

config-version: 4
