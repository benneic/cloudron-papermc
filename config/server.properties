# PaperMC Server Properties — Kid-Friendly Creative Mode Defaults
# Edit this file via the Cloudron File Manager UI after installation.

# Server basics
server-port=25565
gamemode=creative
difficulty=peaceful
force-gamemode=true
level-type=minecraft\:normal
level-name=world
motd=\u00a7bWelcome to our Minecraft world! \u00a7aHave fun building!

# Player safety
pvp=false
spawn-protection=16
max-players=10
white-list=true
enforce-whitelist=true
online-mode=true
enable-command-block=false

# Spawn settings
spawn-monsters=false
spawn-animals=true
spawn-npcs=true
allow-flight=true

# Performance
view-distance=10
simulation-distance=8
max-tick-time=60000
network-compression-threshold=256

# Anti-grief
allow-nether=true
enable-rcon=false
broadcast-rcon-to-ops=false
broadcast-console-to-ops=true

# Miscellaneous
enable-query=false
enable-jmx-monitoring=false
enable-status=true
entity-broadcast-range-percentage=100
function-permission-level=2
log-ips=true
max-chained-neighbor-updates=1000000
max-world-size=10000
op-permission-level=4
player-idle-timeout=30
rate-limit=0
require-resource-pack=false
sync-chunk-writes=true
use-native-transport=true
